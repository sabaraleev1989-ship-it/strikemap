<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Scorpion Tactical v.17.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --bg: #0a0c14; --panel: #161b22; --accent: #ff9f0a; --danger: #ff453a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .toolbar { background: var(--panel); border-bottom: 2px solid #30363d; z-index: 2000; padding: 4px; }
        .tool-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
        .tool-row:last-child { margin-bottom: 0; }
        
        button, select { 
            background: #21262d; border: 1px solid #30363d; color: white; 
            border-radius: 8px; font-size: 14px; min-height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            touch-action: manipulation; flex: 1;
        }
        
        .btn-small { flex: 0.5; }
        .active-tool { border-color: var(--accent); background: rgba(255, 159, 10, 0.2); }
        
        #mapPresets { flex: 2; } 
        #sizeSlider { flex: 2.5; height: 30px; accent-color: var(--accent); }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 2px solid var(--accent); padding: 12px; border-radius: 12px; z-index: 3000; display: none; width: 85%; max-width: 350px; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        #viewport { flex-grow: 1; position: relative; background: #000; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .status-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 15px; font-size: 11px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="handleMapChange(this.value)">
            <option value="">🗺️ КАРТА</option>
            <option value="logo1.png" data-fixed="true">База 99</option>
            <option value="logo2.png" data-fixed="true">Ахун</option>
        </select>
        <button class="btn-small" onclick="document.getElementById('fileInput').click()">⚙️</button>
        <button class="btn-small" onclick="deleteCurrentMap()" style="color:var(--danger)">❌</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="addNewMap(this)">
        <button class="btn-small" onclick="undo()">↩️</button>
        <button class="btn-small" onclick="redo()">↪️</button>
    </div>

    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')" class="active-tool">✥</button>
        <button id="pencilBtn" onclick="setTool('pencil')">✏️</button>
        <button id="drawBtn" onclick="setTool('draw')">↗️</button>
        <button id="tacticsBtn" onclick="setTool('tactics')">🚩</button>
        <button class="btn-small" onclick="if(confirm('Очистить?')) {objects=[]; render();}" style="color: var(--danger)">🗑️</button>
    </div>

    <div class="tool-row">
        <input type="range" id="sizeSlider" min="10" max="250" value="60" oninput="updateObjSize(this.value)">
        <input type="color" id="colorPicker" value="#32d74b" style="width:45px; height:40px; border:none; background:none; padding:0;" onchange="updateObjColor(this.value)">
    </div>
</div>

<div id="tacticsModal" class="modal">
    <button onclick="selectTacticShape('scorpion')">🦂</button>
    <button onclick="selectTacticShape('octopus')">🐙</button>
    <button onclick="selectTacticShape('99')">99</button>
    <button onclick="selectTacticShape('knight')">LEGION</button>
    <button onclick="selectTacticShape('bsg')">BSG</button>
    <button onclick="selectTacticShape('flag')">🚩</button>
    <button onclick="selectTacticShape('skull')">💀</button>
    <button onclick="selectTacticShape('boom')">💥</button>
    <button onclick="selectTacticShape('sun')">☀️</button>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <canvas id="tempCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Зум: 100%</div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        const sw = `const C='sc-v17.1'; self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])))); self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
        const b = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(b));
    }

    const viewport = document.getElementById('viewport'), bgCanvas = document.getElementById('bgCanvas'), drawCanvas = document.getElementById('drawCanvas'), tempCanvas = document.getElementById('tempCanvas');
    const bgCtx = bgCanvas.getContext('2d'), drawCtx = drawCanvas.getContext('2d'), tempCtx = tempCanvas.getContext('2d');
    
    let bgImage = new Image(), objects = [], history = [], redoStack = [], selectedObj = null;
    let scale = 1, posX = 0, posY = 0, lastScale, lastPosX, lastPosY;
    let currentTool = 'move', currentTacticShape = 'flag', isDrawing = false, startP = {x:0, y:0};

    function addNewMap(input) {
        if (input.files && input.files[0]) {
            const name = prompt("Название:", "Новая карта");
            if (!name) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const url = e.target.result;
                const select = document.getElementById('mapPresets');
                const opt = document.createElement('option');
                opt.value = url; opt.text = name;
                select.appendChild(opt);
                let saved = JSON.parse(localStorage.getItem('st_maps') || '[]');
                saved.push({name, url});
                localStorage.setItem('st_maps', JSON.stringify(saved));
                select.value = url; handleMapChange(url);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function deleteCurrentMap() {
        const s = document.getElementById('mapPresets');
        if (!s.value || s.options[s.selectedIndex].dataset.fixed) return alert("Нельзя удалить");
        if (confirm("Удалить карту?")) {
            let saved = JSON.parse(localStorage.getItem('st_maps') || '[]');
            saved = saved.filter(m => m.url !== s.value);
            localStorage.setItem('st_maps', JSON.stringify(saved));
            s.options[s.selectedIndex].remove(); s.value = "";
            bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height); render();
        }
    }

    function loadCustomMaps() {
        const saved = JSON.parse(localStorage.getItem('st_maps') || '[]');
        const select = document.getElementById('mapPresets');
        saved.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.url; opt.text = m.name;
            select.appendChild(opt);
        });
    }

    function handleMapChange(url) {
        if (!url) return;
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = tempCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = tempCanvas.height = bgImage.height;
            scale = Math.min(viewport.clientWidth/bgImage.width, viewport.clientHeight/bgImage.height);
            posX = (viewport.clientWidth - bgImage.width * scale)/2;
            posY = (viewport.clientHeight - bgImage.height * scale)/2;
            applyTransform(); render();
        };
    }

    function applyTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        [bgCanvas, drawCanvas, tempCanvas].forEach(c => c.style.transform = tr);
        bgCtx.drawImage(bgImage, 0, 0);
        document.getElementById('zoomVal').innerText = `Зум: ${Math.round(scale * 100)}%`;
    }

    function setTool(t) {
        document.getElementById('tacticsModal').style.display = (t === 'tactics') ? 'grid' : 'none';
        currentTool = t;
        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active-tool'));
        document.getElementById(t + 'Btn')?.classList.add('active-tool');
        selectedObj = null; render();
    }

    function selectTacticShape(s) { currentTacticShape = s; document.getElementById('tacticsModal').style.display = 'none'; }
    function updateObjSize(v) { if(selectedObj) { selectedObj.size = parseFloat(v); render(); } }
    function updateObjColor(v) { if(selectedObj) { selectedObj.color = v; render(); } }

    function render() {
        drawCtx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
        objects.forEach(obj => {
            drawCtx.save();
            if(obj === selectedObj) {
                drawCtx.strokeStyle = "white"; drawCtx.lineWidth = 4/scale;
                const r = (obj.type === 'tactic' ? obj.size * 3 : obj.size) * 1.1;
                drawCtx.strokeRect(obj.x - r/2, obj.y - r/2, r, r);
            }
            if(obj.type === 'tactic') drawTactic(drawCtx, obj);
            else if(obj.type === 'arrow') drawArrow(drawCtx, obj);
            else if(obj.type === 'pencil') drawPencil(drawCtx, obj);
            drawCtx.restore();
        });
    }

    function drawTactic(ctx, obj) {
        const map = { scorpion: '🦂', octopus: '🐙', '99': '99', knight: 'LEGION', bsg: 'BSG', flag: '🚩', skull: '💀', boom: '💥', sun: '☀️' };
        const content = map[obj.shape] || obj.shape;
        const displaySize = obj.size * 3; // Увеличено для видимости на фото
        ctx.translate(obj.x, obj.y);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${displaySize}px Arial`;
        if (['99', 'BSG', 'LEGION', '🚩'].includes(content)) {
            ctx.strokeStyle = "black"; ctx.lineWidth = displaySize / 8;
            ctx.strokeText(content, 0, 0);
            ctx.fillStyle = obj.color; ctx.fillText(content, 0, 0);
        } else {
            ctx.shadowColor = "black"; ctx.shadowBlur = 10;
            ctx.fillStyle = "#fff"; ctx.fillText(content, 0, 0);
        }
    }

    function drawArrow(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; 
        ctx.lineWidth = obj.size / 6;
        ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();
        const angle = Math.atan2(obj.y2 - obj.y, obj.x2 - obj.x);
        const headLen = obj.size / 1.5; 
        ctx.beginPath(); ctx.moveTo(obj.x2, obj.y2);
        ctx.lineTo(obj.x2 - headLen * Math.cos(angle - 0.5), obj.y2 - headLen * Math.sin(angle - 0.5));
        ctx.lineTo(obj.x2 - headLen * Math.cos(angle + 0.5), obj.y2 - headLen * Math.sin(angle + 0.5));
        ctx.fill();
        if(obj.label) {
            ctx.font = `bold ${obj.size / 2}px Arial`; // Уменьшен шрифт текста
            ctx.textAlign = "center";
            ctx.strokeStyle = "black"; ctx.lineWidth = 4/scale;
            ctx.strokeText(obj.label.toUpperCase(), obj.x2, obj.y2 - (obj.size/1.5));
            ctx.fillText(obj.label.toUpperCase(), obj.x2, obj.y2 - (obj.size/1.5));
        }
    }

    function drawPencil(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.lineWidth = obj.width; ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.beginPath(); ctx.moveTo(obj.points[0].x, obj.points[0].y);
        obj.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
    }

    function getCoords(e) {
        const r = viewport.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - r.left - posX)/scale, y: (cy - r.top - posY)/scale };
    }

    viewport.addEventListener('pointerdown', (e) => {
        if(!bgImage.src) return;
        const p = getCoords(e);
        if(currentTool === 'move') {
            selectedObj = [...objects].reverse().find(o => Math.hypot(o.x - p.x, o.y - p.y) < (o.size*3)/scale);
            if(selectedObj) document.getElementById('sizeSlider').value = selectedObj.size;
            render(); return;
        }
        isDrawing = true; startP = p; saveState();
        if(currentTool === 'pencil') objects.push({ type:'pencil', color:document.getElementById('colorPicker').value, width:document.getElementById('sizeSlider').value/8/scale, points:[p] });
    });

    viewport.addEventListener('pointermove', (e) => {
        if(!isDrawing) return;
        const p = getCoords(e);
        tempCtx.clearRect(0,0, tempCanvas.width, tempCanvas.height);
        if(currentTool === 'pencil') { objects[objects.length-1].points.push(p); render(); }
        else if(currentTool === 'draw') drawArrow(tempCtx, {x:startP.x, y:startP.y, x2:p.x, y2:p.y, color:document.getElementById('colorPicker').value, size:document.getElementById('sizeSlider').value/scale});
    });

    window.addEventListener('pointerup', (e) => {
        if(!isDrawing) return; isDrawing = false;
        const p = getCoords(e), color = document.getElementById('colorPicker').value, size = parseFloat(document.getElementById('sizeSlider').value);
        if(currentTool === 'draw') {
            const l = prompt("Позывной:");
            objects.push({ type:'arrow', x:startP.x, y:startP.y, x2:p.x, y2:p.y, size:size/scale, color, label:l||"" });
        } else if(currentTool === 'tactics') {
            objects.push({ type:'tactic', shape:currentTacticShape, x:p.x, y:p.y, size, color });
        }
        tempCtx.clearRect(0,0, tempCanvas.width, tempCanvas.height); render();
    });

    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));
    mc.add(new Hammer.Pinch({ enable: true }));
    mc.on("panstart pinchstart", () => {
        lastPosX = posX; lastPosY = posY; lastScale = scale;
        if(selectedObj) { selectedObj._x = selectedObj.x; selectedObj._y = selectedObj.y; selectedObj._x2 = selectedObj.x2; selectedObj._y2 = selectedObj.y2; }
    });
    mc.on("panmove pinchmove", (e) => {
        if(selectedObj) {
            const dx = e.deltaX/scale, dy = e.deltaY/scale;
            selectedObj.x = selectedObj._x + dx; selectedObj.y = selectedObj._y + dy;
            if(selectedObj.type === 'arrow') { selectedObj.x2 = selectedObj._x2 + dx; selectedObj.y2 = selectedObj._y2 + dy; }
            render();
        } else if(currentTool === 'move') {
            posX = lastPosX + e.deltaX; posY = lastPosY + e.deltaY;
            if(e.type === 'pinchmove') scale = Math.max(0.05, lastScale * e.scale);
            applyTransform();
        }
    });

    function saveState() { history.push(JSON.stringify(objects)); redoStack = []; }
    function undo() { if(history.length) { redoStack.push(JSON.stringify(objects)); objects = JSON.parse(history.pop()); render(); } }
    function redo() { if(redoStack.length) { history.push(JSON.stringify(objects)); objects = JSON.parse(redoStack.pop()); render(); } }
    window.addEventListener('load', loadCustomMaps);
</script>
</body>
</html>
