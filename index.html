<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical</title>
    
    <link rel="apple-touch-icon" href="logo4.png">
    <link rel="icon" type="image/png" href="logo4.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1c2c;
            --accent: #ff9f0a;
            --danger: #ff453a;
            --success: #32d74b;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        .toolbar {
            background: var(--panel-bg);
            display: flex; flex-direction: column;
            border-bottom: 2px solid #333;
            z-index: 2000;
            position: relative;
        }

        .tool-row {
            display: flex; justify-content: space-around;
            align-items: center; padding: 8px 5px; gap: 8px;
        }

        select, button {
            background: #2c2e43; border: 1px solid #444;
            color: white; padding: 12px; border-radius: 12px;
            font-size: 24px; cursor: pointer; flex: 1;
            display: flex; align-items: center; justify-content: center;
            min-height: 60px;
        }

        select { font-size: 16px; flex: 1.5; }

        .active-tool {
            border-color: var(--accent);
            background: rgba(255, 159, 10, 0.3);
            box-shadow: 0 0 15px var(--accent);
        }

        #viewport {
            flex-grow: 1; position: relative;
            background: #000; touch-action: none; overflow: hidden;
            z-index: 1;
        }

        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 500;
            display: flex; align-items: center; justify-content: center;
            visibility: visible;
        }

        #startScreen img { width: 100%; height: 100%; object-fit: cover; }

        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #bgCanvas { z-index: 10; }
        #drawCanvas { z-index: 20; }
        #tempCanvas { z-index: 30; pointer-events: none; } /* Для предпросмотра */

        .status-bar {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.7);
            padding: 5px 15px; border-radius: 20px; font-size: 14px;
            z-index: 100; border: 1px solid #444; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="loadMap(this.value)">
            <option value="">🗺️ ПОЛИГОН</option>
            <option value="logo1.png">99 Проблем</option>
            <option value="logo2.png">Ахун</option>
        </select>
        <button onclick="undo()">↩️</button>
        <button onclick="redo()">↪️</button>
        <button onclick="saveImage()" style="color: var(--success)">💾</button>
        <button onclick="clearAll()" style="color: var(--danger)">🗑️</button>
    </div>
    
    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')">✥</button>
        <button id="pencilBtn" onclick="setTool('pencil')">✏️</button>
        <button id="drawBtn" class="active-tool" onclick="setTool('draw')">↗️</button>
        <button id="eraseBtn" onclick="setTool('erase')">🧽</button>
        <div style="flex:1; display:flex; justify-content:center;">
            <input type="color" id="colorPicker" value="#32d74b" style="width:45px; height:45px; border:none; background:none;">
        </div>
    </div>
</div>

<div id="viewport">
    <div id="startScreen"><img src="logo3.png" alt="Scorpion"></div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <canvas id="tempCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Масштаб: 100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const startScreen = document.getElementById('startScreen');
    const bgCanvas = document.getElementById('bgCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const tempCanvas = document.getElementById('tempCanvas');
    
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const tempCtx = tempCanvas.getContext('2d');
    const zoomDisplay = document.getElementById('zoomVal');

    let bgImage = new Image();
    let currentTool = 'draw';
    
    // Для Undo/Redo в растровом режиме храним снимки состояния (Canvas Snapshots)
    let history = [];
    let redoStack = [];
    const MAX_HISTORY = 10;

    let scale = 1, posX = 0, posY = 0;
    let lastScale = 1, lastPosX = 0, lastPosY = 0;
    let isDrawing = false;
    let startPoint = {x: 0, y: 0};

    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));

    function setTool(tool) {
        currentTool = tool;
        ['drawBtn', 'pencilBtn', 'eraseBtn', 'moveBtn'].forEach(id => {
            document.getElementById(id).classList.toggle('active-tool', id.startsWith(tool));
        });
    }

    function saveState() {
        history.push(drawCanvas.toDataURL());
        if (history.length > MAX_HISTORY) history.shift();
        redoStack = [];
    }

    function loadMap(url) {
        if (!url) {
            startScreen.style.visibility = 'visible';
            return;
        }
        startScreen.style.visibility = 'hidden';
        bgImage.src = url;
        bgImage.onload = () => {
            [bgCanvas, drawCanvas, tempCanvas].forEach(c => {
                c.width = bgImage.width;
                c.height = bgImage.height;
            });
            drawCtx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
            history = [];
            resetView();
        };
    }

    function resetView() {
        const sRatio = viewport.clientWidth / viewport.clientHeight;
        const mRatio = bgImage.width / bgImage.height;
        scale = (mRatio > sRatio) ? (viewport.clientWidth / bgImage.width) : (viewport.clientHeight / bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale) / 2;
        posY = (viewport.clientHeight - bgImage.height * scale) / 2;
        applyTransform();
    }

    function applyTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        [bgCanvas, drawCanvas, tempCanvas].forEach(c => c.style.transform = tr);
        bgCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
        bgCtx.drawImage(bgImage, 0, 0);
        zoomDisplay.innerText = `Масштаб: ${Math.round(scale * 100)}%`;
    }

    function getCoords(e) {
        const rect = viewport.getBoundingClientRect();
        return { 
            x: (e.clientX - rect.left - posX) / scale, 
            y: (e.clientY - rect.top - posY) / scale 
        };
    }

    viewport.addEventListener('pointerdown', (e) => {
        if (!bgImage.src || (e.pointerType === 'touch' && !e.isPrimary)) return;
        const p = getCoords(e);
        
        if (currentTool === 'move') return;

        isDrawing = true;
        startPoint = p;
        saveState();

        if (currentTool === 'pencil' || currentTool === 'erase') {
            drawCtx.beginPath();
            drawCtx.moveTo(p.x, p.y);
        }
    });

    viewport.addEventListener('pointermove', (e) => {
        if (!isDrawing) return;
        const p = getCoords(e);

        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);

        if (currentTool === 'pencil') {
            drawCtx.lineWidth = 6 / scale;
            drawCtx.strokeStyle = document.getElementById('colorPicker').value;
            drawCtx.lineCap = 'round';
            drawCtx.lineTo(p.x, p.y);
            drawCtx.stroke();
        } else if (currentTool === 'erase') {
            drawCtx.globalCompositeOperation = 'destination-out';
            drawCtx.lineWidth = 30 / scale; // Ширина ластика
            drawCtx.lineCap = 'round';
            drawCtx.lineTo(p.x, p.y);
            drawCtx.stroke();
            drawCtx.globalCompositeOperation = 'source-over';
        } else if (currentTool === 'draw') {
            // Рисуем стрелку во временном слое
            const bend = (e.clientX - (startPoint.x * scale + posX + viewport.getBoundingClientRect().left)) * 0.001;
            drawArrow(tempCtx, startPoint.x, startPoint.y, p.x, p.y, document.getElementById('colorPicker').value, '', bend);
        }
    });

    window.addEventListener('pointerup', (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        const p = getCoords(e);

        if (currentTool === 'draw') {
            const label = prompt("Позывной:");
            const bend = (e.clientX - (startPoint.x * scale + posX + viewport.getBoundingClientRect().left)) * 0.001;
            drawArrow(drawCtx, startPoint.x, startPoint.y, p.x, p.y, document.getElementById('colorPicker').value, label, bend);
            tempCtx.clearRect(0,0, tempCanvas.width, tempCanvas.height);
        }
    });

    function drawArrow(ctx, x1, y1, x2, y2, color, label, bend = 0.2) {
        ctx.beginPath();
        ctx.lineWidth = 6 / scale;
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        
        const cpX = (x1 + x2) / 2 - (y2 - y1) * bend;
        const cpY = (y1 + y2) / 2 + (x2 - x1) * bend;

        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(cpX, cpY, x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - cpY, x2 - cpX);
        const headLen = 22 / scale;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/ HeadLen));
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
        ctx.closePath();
        ctx.fill();

        if (label) {
            ctx.font = `bold ${24/scale}px Arial`;
            ctx.textAlign = "center";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 5;
            ctx.fillText(label.toUpperCase(), x2, y2 - 20/scale);
            ctx.shadowBlur = 0;
        }
    }

    function undo() {
        if (history.length > 0) {
            redoStack.push(drawCanvas.toDataURL());
            const img = new Image();
            img.src = history.pop();
            img.onload = () => {
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                drawCtx.drawImage(img, 0, 0);
            };
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            history.push(drawCanvas.toDataURL());
            const img = new Image();
            img.src = redoStack.pop();
            img.onload = () => {
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                drawCtx.drawImage(img, 0, 0);
            };
        }
    }

    // Обработка жестов масштабирования
    mc.on("pinchstart panstart", (e) => {
        lastScale = scale; lastPosX = posX; lastPosY = posY;
    });

    mc.on("pinchmove panmove", (e) => {
        if (currentTool === 'move' || e.pointers.length >= 2) {
            if (e.type === 'pinchmove') scale = Math.max(0.1, Math.min(lastScale * e.scale, 8));
            posX = lastPosX + e.deltaX;
            posY = lastPosY + e.deltaY;
            applyTransform();
        }
    });

    function clearAll() {
        if(confirm("Очистить всё?")) {
            saveState();
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
    }

    function saveImage() {
        const temp = document.createElement('canvas');
        temp.width = drawCanvas.width; temp.height = drawCanvas.height;
        const tCtx = temp.getContext('2d');
        tCtx.drawImage(bgCanvas, 0, 0);
        tCtx.drawImage(drawCanvas, 0, 0);
        const link = document.createElement('a');
        link.download = 'tactical-map.png';
        link.href = temp.toDataURL();
        link.click();
    }
</script>
</body>
</html>
