<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical Object-OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --bg-dark: #0f111a; --panel-bg: #1a1c2c; --accent: #ff9f0a; --danger: #ff453a; --success: #32d74b; }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .toolbar { background: var(--panel-bg); display: flex; flex-direction: column; border-bottom: 2px solid #333; z-index: 2000; }
        /* Исправлено: более плотное расположение для узких экранов */
        .tool-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; gap: 4px; }
        
        button, select { 
            background: #2c2e43; border: 1px solid #444; color: white; padding: 5px; 
            border-radius: 10px; font-size: 22px; cursor: pointer; flex: 1; 
            display: flex; align-items: center; justify-content: center; min-height: 50px;
            min-width: 0; transition: 0.2s;
        }
        
        select { flex: 2; font-size: 18px; } /* ПОЛИГОН теперь влезет */
        
        .active-tool { border-color: var(--accent); background: rgba(255, 159, 10, 0.3); }

        #tacticsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-bg); border: 2px solid var(--success); padding: 20px;
            border-radius: 20px; z-index: 3000; display: none; flex-direction: column; gap: 15px; width: 85%;
        }

        .modal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        #viewport { flex-grow: 1; position: relative; background: #000; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 500; display: flex; align-items: center; justify-content: center; }
        #startScreen img { width: 100%; height: 100%; object-fit: cover; }
        .status-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 2px 10px; border-radius: 10px; font-size: 12px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div id="startScreen"><img src="logo3.png"></div>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="handleMapChange(this.value)">
            <option value="">🗺️ ПОЛИГОН</option>
            <option value="logo1.png">99 Проблем</option>
            <option value="logo2.png">Ахун</option>
        </select>
        <button onclick="undo()">↩️</button>
        <button onclick="redo()">↪️</button>
        <button onclick="deleteSelected()" style="color: var(--danger)">🗑️</button>
    </div>
    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')" class="active-tool">✥</button>
        <button id="drawBtn" onclick="setTool('draw')">↗️</button>
        <button id="tacticsBtn" onclick="setTool('tactics')">🚩</button>
        <div style="flex:0.4; display:flex; justify-content:center;">
            <input type="color" id="colorPicker" value="#32d74b" style="width:40px; height:40px; border:none; background:none;">
        </div>
    </div>
</div>

<div id="tacticsModal">
    <div style="font-weight: bold; color: var(--success); text-align: center;">ВЫБОР ФИГУРЫ</div>
    <div class="modal-grid">
        <button onclick="selectTacticShape('flag')">🚩</button>
        <button onclick="selectTacticShape('circle')">⭕</button>
        <button onclick="selectTacticShape('square')">⬛</button>
        <button onclick="selectTacticShape('skull')">💀</button>
        <button onclick="selectTacticShape('boom')">💥</button>
        <button onclick="selectTacticShape('shield')">🛡️</button>
        <button onclick="selectTacticShape('star')">⭐</button>
    </div>
    <button onclick="document.getElementById('tacticsModal').style.display='none'" style="background: var(--success);">ОК</button>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Масштаб: 100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport'), bgCanvas = document.getElementById('bgCanvas'), drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d'), drawCtx = drawCanvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');

    let bgImage = new Image(), objects = [], history = [], redoStack = [], selectedObj = null;
    let scale = 1, posX = 0, posY = 0, lastScale, lastPosX, lastPosY;
    let currentTool = 'move', currentTacticShape = 'flag';

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool-row button').forEach(b => b.classList.remove('active-tool'));
        document.getElementById(t+'Btn')?.classList.add('active-tool');
        if(t === 'tactics') document.getElementById('tacticsModal').style.display = 'flex';
    }

    function selectTacticShape(s) { currentTacticShape = s; document.getElementById('tacticsModal').style.display = 'none'; setTool('tactics'); }

    function handleMapChange(url) {
        if (!url) { document.getElementById('startScreen').style.display = 'flex'; return; }
        document.getElementById('startScreen').style.display = 'none';
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = bgImage.height;
            objects = []; resetView(); render();
        };
    }

    function resetView() {
        scale = Math.min(viewport.clientWidth/bgImage.width, viewport.clientHeight/bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale)/2;
        posY = (viewport.clientHeight - bgImage.height * scale)/2;
        applyTransform();
    }

    function applyTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        bgCanvas.style.transform = drawCanvas.style.transform = tr;
        bgCtx.drawImage(bgImage, 0, 0);
        document.getElementById('zoomVal').innerText = `Масштаб: ${Math.round(scale * 100)}%`;
    }

    function render() {
        drawCtx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
        objects.forEach(obj => {
            drawCtx.save();
            if(obj === selectedObj) {
                drawCtx.shadowBlur = 15; drawCtx.shadowColor = 'white';
                drawCtx.strokeStyle = 'rgba(255,255,255,0.5)';
                drawCtx.strokeRect(obj.x - obj.size/2 - 5, obj.y - obj.size/2 - 5, obj.size + 10, obj.size + 10);
            }
            if(obj.type === 'tactic') drawShape(drawCtx, obj);
            else drawArrow(drawCtx, obj);
            drawCtx.restore();
        });
    }

    function drawShape(ctx, obj) {
        ctx.save(); ctx.translate(obj.x, obj.y);
        ctx.fillStyle = obj.color; ctx.strokeStyle = obj.color; ctx.lineWidth = obj.size/10;
        const s = obj.size/2;
        if(obj.shape === 'flag') { ctx.fillRect(-2, -s, 4, s*2); ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, -s/2); ctx.lineTo(0,0); ctx.fill(); }
        else if(obj.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0, s, 0, 7); ctx.stroke(); }
        else if(obj.shape === 'square') { ctx.strokeRect(-s, -s, obj.size, obj.size); }
        else { ctx.font = `${obj.size}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(getEmoji(obj.shape), 0,0); }
        ctx.restore();
    }

    function getEmoji(s) { return {skull:'💀', boom:'💥', shield:'🛡️', star:'⭐'}[s] || '📍'; }

    function drawArrow(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; ctx.lineWidth = obj.size/5;
        ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();
        
        const angle = Math.atan2(obj.y2 - obj.y, obj.x2 - obj.x);
        const head = obj.size;
        ctx.beginPath(); ctx.moveTo(obj.x2, obj.y2);
        ctx.lineTo(obj.x2 - head * Math.cos(angle - 0.5), obj.y2 - head * Math.sin(angle - 0.5));
        ctx.lineTo(obj.x2 - head * Math.cos(angle + 0.5), obj.y2 - head * Math.sin(angle + 0.5));
        ctx.fill();

        if (obj.label) {
            ctx.font = `bold ${obj.size * 1.2}px Arial`;
            ctx.textAlign = "center";
            ctx.lineWidth = 4; ctx.strokeStyle = "white";
            ctx.strokeText(obj.label.toUpperCase(), obj.x2, obj.y2 - head);
            ctx.fillText(obj.label.toUpperCase(), obj.x2, obj.y2 - head);
        }
    }

    // УПРАВЛЕНИЕ ОБЪЕКТАМИ
    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Tap());

    mc.on("tap", (e) => {
        const p = getCoords(e.center);
        selectedObj = [...objects].reverse().find(o => Math.hypot(o.x - p.x, o.y - p.y) < (o.size || 40));
        render();
    });

    mc.on("panstart pinchstart", (e) => {
        lastPosX = posX; lastPosY = posY; lastScale = scale;
        if(selectedObj) {
            selectedObj._x = selectedObj.x; selectedObj._y = selectedObj.y;
            selectedObj._x2 = selectedObj.x2; selectedObj._y2 = selectedObj.y2;
            selectedObj._s = selectedObj.size;
        }
    });

    mc.on("panmove pinchemove", (e) => {
        if(selectedObj) {
            if(e.type.includes('pinch')) {
                selectedObj.size = Math.max(10, selectedObj._s * e.scale);
            } else {
                const dx = e.deltaX/scale, dy = e.deltaY/scale;
                selectedObj.x = selectedObj._x + dx;
                selectedObj.y = selectedObj._y + dy;
                if(selectedObj.type === 'arrow') {
                    selectedObj.x2 = selectedObj._x2 + dx;
                    selectedObj.y2 = selectedObj._y2 + dy;
                }
            }
            render();
        } else if(currentTool === 'move') {
            posX = lastPosX + e.deltaX; posY = lastPosY + e.deltaY;
            if(e.type.includes('pinch')) scale = Math.max(0.1, lastScale * e.scale);
            applyTransform();
        }
    });

    viewport.addEventListener('pointerdown', (e) => {
        if(currentTool === 'move' || selectedObj) return;
        const p = getCoords(e);
        saveState();
        if(currentTool === 'tactics') {
            objects.push({ type:'tactic', shape:currentTacticShape, x:p.x, y:p.y, size:60, color:colorPicker.value });
            selectedObj = objects[objects.length-1];
        } else if(currentTool === 'draw') {
            const label = prompt("Позывной:");
            objects.push({ type:'arrow', x:p.x, y:p.y, x2:p.x+100, y2:p.y-100, size:25, color:colorPicker.value, label:label });
            selectedObj = objects[objects.length-1];
        }
        render();
    });

    function getCoords(c) {
        const r = viewport.getBoundingClientRect();
        return { x: (c.x - r.left - posX)/scale, y: (c.y - r.top - posY)/scale };
    }

    function saveState() { history.push(JSON.stringify(objects)); redoStack = []; }
    function undo() { if(history.length) { redoStack.push(JSON.stringify(objects)); objects = JSON.parse(history.pop()); render(); } }
    function redo() { if(redoStack.length) { history.push(JSON.stringify(objects)); objects = JSON.parse(redoStack.pop()); render(); } }
    function deleteSelected() { if(selectedObj) { saveState(); objects = objects.filter(o => o !== selectedObj); selectedObj = null; render(); } }
</script>
</body>
</html>
