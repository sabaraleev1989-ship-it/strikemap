<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical Object-OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --bg-dark: #0f111a; --panel-bg: #1a1c2c; --accent: #ff9f0a; --danger: #ff453a; --success: #32d74b; }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: var(--panel-bg); border-bottom: 2px solid #333; z-index: 2000; }
        .tool-row { display: flex; justify-content: space-around; padding: 8px; gap: 8px; }
        button, select { background: #2c2e43; border: 1px solid #444; color: white; border-radius: 12px; font-size: 22px; cursor: pointer; flex: 1; min-height: 55px; display: flex; align-items: center; justify-content: center; }
        .active-tool { border-color: var(--accent); background: rgba(255, 159, 10, 0.2); }
        #viewport { flex-grow: 1; position: relative; background: #000; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #startScreen img { width: 100%; height: 100%; object-fit: cover; }
        #tacticsModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel-bg); border: 2px solid var(--success); padding: 20px; border-radius: 20px; z-index: 3000; display: none; width: 80%; }
        .modal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="startScreen"><img src="logo3.png"></div>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="loadMap(this.value)">
            <option value="">🗺️ КАРТА</option>
            <option value="logo1.png">99 Проблем</option>
            <option value="logo2.png">Ахун</option>
        </select>
        <button onclick="deleteSelected()" style="color: var(--danger)">🗑️ УДАЛИТЬ</button>
        <button onclick="clearAll()" style="color: #666">🧹 ВСЁ</button>
    </div>
    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')" class="active-tool">✥</button>
        <button id="drawBtn" onclick="setTool('draw')">↗️</button>
        <button id="tacticsBtn" onclick="setTool('tactics')">🚩</button>
        <input type="color" id="colorPicker" value="#32d74b" style="width:50px; height:55px;">
    </div>
</div>

<div id="tacticsModal">
    <div class="modal-grid">
        <button onclick="selectTacticShape('flag')">🚩</button>
        <button onclick="selectTacticShape('circle')">⭕</button>
        <button onclick="selectTacticShape('square')">⬛</button>
        <button onclick="selectTacticShape('skull')">💀</button>
        <button onclick="selectTacticShape('boom')">💥</button>
        <button onclick="selectTacticShape('shield')">🛡️</button>
        <button onclick="selectTacticShape('star')">⭐</button>
    </div>
    <button onclick="document.getElementById('tacticsModal').style.display='none'" style="width:100%">ЗАКРЫТЬ</button>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
</div>

<script>
    const viewport = document.getElementById('viewport'), bgCanvas = document.getElementById('bgCanvas'), drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d'), drawCtx = drawCanvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');

    let bgImage = new Image(), objects = [], selectedObj = null, currentTool = 'move';
    let scale = 1, posX = 0, posY = 0, lastPosX, lastPosY, lastScale;
    let currentTacticShape = 'flag';

    function setTool(t) { 
        currentTool = t; 
        document.querySelectorAll('.tool-row button').forEach(b => b.classList.remove('active-tool'));
        document.getElementById(t+'Btn')?.classList.add('active-tool');
        if(t === 'tactics') document.getElementById('tacticsModal').style.display = 'block';
    }

    function selectTacticShape(s) { currentTacticShape = s; document.getElementById('tacticsModal').style.display = 'none'; setTool('tactics'); }

    function loadMap(url) {
        if(!url) return; document.getElementById('startScreen').style.display = 'none';
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = bgImage.height;
            resetView(); render();
        };
    }

    function resetView() {
        scale = Math.min(viewport.clientWidth/bgImage.width, viewport.clientHeight/bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale)/2;
        posY = (viewport.clientHeight - bgImage.height * scale)/2;
        applyTransform();
    }

    function applyTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        bgCanvas.style.transform = drawCanvas.style.transform = tr;
        bgCtx.drawImage(bgImage, 0, 0);
    }

    function render() {
        drawCtx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
        objects.forEach(obj => {
            drawCtx.save();
            if(obj === selectedObj) {
                drawCtx.shadowBlur = 15; drawCtx.shadowColor = 'white';
                drawCtx.strokeStyle = 'white'; drawCtx.lineWidth = 2/scale;
                drawCtx.strokeRect(obj.x - obj.size/2, obj.y - obj.size/2, obj.size, obj.size);
            }
            if(obj.type === 'tactic') drawShape(drawCtx, obj);
            else drawArrow(drawCtx, obj);
            drawCtx.restore();
        });
    }

    function drawShape(ctx, obj) {
        ctx.fillStyle = obj.color; ctx.strokeStyle = obj.color; ctx.lineWidth = obj.size/10;
        const s = obj.size/2;
        ctx.translate(obj.x, obj.y);
        if(obj.shape === 'flag') { ctx.fillRect(-2, -s, 4, s*2); ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, -s/2); ctx.lineTo(0,0); ctx.fill(); }
        else if(obj.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0, s, 0, 7); ctx.stroke(); }
        else if(obj.shape === 'skull') { ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.7, Math.PI, 0); ctx.lineTo(s*0.4, s*0.6); ctx.lineTo(-s*0.4, s*0.6); ctx.closePath(); ctx.fill(); }
        else { ctx.font = `${obj.size}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('📍', 0,0); }
    }

    function drawArrow(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; ctx.lineWidth = obj.size;
        ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();
        const angle = Math.atan2(obj.y2 - obj.y, obj.x2 - obj.x);
        ctx.beginPath(); ctx.moveTo(obj.x2, obj.y2);
        ctx.lineTo(obj.x2 - 20*Math.cos(angle-0.5), obj.y2 - 20*Math.sin(angle-0.5));
        ctx.lineTo(obj.x2 - 20*Math.cos(angle+0.5), obj.y2 - 20*Math.sin(angle+0.5));
        ctx.fill();
    }

    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Tap());

    mc.on("tap", (e) => {
        const p = getCoords(e.center);
        selectedObj = objects.slice().reverse().find(o => Math.hypot(o.x - p.x, o.y - p.y) < (o.size || 30));
        render();
    });

    mc.on("panstart pinchstart", (e) => {
        lastPosX = posX; lastPosY = posY; lastScale = scale;
        if(selectedObj) { selectedObj._s = selectedObj.size; selectedObj._x = selectedObj.x; selectedObj._y = selectedObj.y; }
    });

    mc.on("panmove pinchemove", (e) => {
        if(selectedObj) {
            if(e.type.includes('pinch')) selectedObj.size = selectedObj._s * e.scale;
            else { selectedObj.x = selectedObj._x + e.deltaX/scale; selectedObj.y = selectedObj._y + e.deltaY/scale; }
            render();
        } else if(currentTool === 'move') {
            posX = lastPosX + e.deltaX; posY = lastPosY + e.deltaY;
            if(e.type.includes('pinch')) scale = lastScale * e.scale;
            applyTransform();
        }
    });

    viewport.addEventListener('pointerdown', (e) => {
        if(currentTool === 'move' || selectedObj) return;
        const p = getCoords(e);
        if(currentTool === 'tactics') {
            objects.push({ type:'tactic', shape:currentTacticShape, x:p.x, y:p.y, size:50, color:colorPicker.value });
            selectedObj = objects[objects.length-1];
        } else if(currentTool === 'draw') {
            objects.push({ type:'arrow', x:p.x, y:p.y, x2:p.x+50, y2:p.y-50, size:5, color:colorPicker.value });
            selectedObj = objects[objects.length-1];
        }
        render();
    });

    function getCoords(c) {
        const r = viewport.getBoundingClientRect();
        return { x: (c.x - r.left - posX)/scale, y: (c.y - r.top - posY)/scale };
    }

    function deleteSelected() { if(selectedObj) { objects = objects.filter(o => o !== selectedObj); selectedObj = null; render(); } }
    function clearAll() { if(confirm("Очистить всё?")) { objects = []; selectedObj = null; render(); } }
</script>
</body>
</html>
