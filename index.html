<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical</title>
    
    <link rel="apple-touch-icon" href="logo4.png">
    <link rel="icon" type="image/png" href="logo4.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1c2c;
            --accent: #ff9f0a;
            --danger: #ff453a;
            --success: #32d74b;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        .toolbar {
            background: var(--panel-bg);
            display: flex; flex-direction: column;
            border-bottom: 2px solid #333;
            z-index: 2000;
            position: relative;
        }

        .tool-row {
            display: flex; justify-content: space-around;
            align-items: center; padding: 8px 5px; gap: 8px;
        }

        .tool-row:first-child { border-bottom: 1px solid #2a2d3e; }

        select, button {
            background: #2c2e43; border: 1px solid #444;
            color: white; padding: 12px; border-radius: 12px;
            font-size: 24px; cursor: pointer; flex: 1;
            display: flex; align-items: center; justify-content: center;
            min-height: 60px;
        }

        select { font-size: 16px; flex: 2; }

        .active-tool {
            border-color: var(--accent);
            background: rgba(255, 159, 10, 0.3);
            box-shadow: 0 0 15px var(--accent);
        }

        #viewport {
            flex-grow: 1; position: relative;
            background: #000; touch-action: none; overflow: hidden;
            z-index: 1;
        }

        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #startScreen img { width: 100%; height: 100%; object-fit: cover; }

        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #bgCanvas { z-index: 10; }
        #drawCanvas { z-index: 20; }

        .status-bar {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.7);
            padding: 5px 15px; border-radius: 20px; font-size: 14px;
            z-index: 100; border: 1px solid #444; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="loadMap(this.value)">
            <option value="">🗺️ ВЫБРАТЬ ПОЛИГОН</option>
            <option value="logo1.png">99 Проблем</option>
            <option value="logo2.png">Ахун</option>
        </select>
        <button onclick="undo()">↩️</button>
        <button onclick="redo()">↪️</button>
        <button onclick="saveImage()" style="color: var(--success)">💾</button>
        <button onclick="clearAll()" style="color: var(--danger)">🗑️</button>
    </div>
    
    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')">✥</button>
        <button id="pencilBtn" onclick="setTool('pencil')">✏️</button>
        <button id="drawBtn" class="active-tool" onclick="setTool('draw')">↗️</button>
        <button id="eraseBtn" onclick="setTool('erase')">🧽</button>
        <div style="flex:1; display:flex; justify-content:center;">
            <input type="color" id="colorPicker" value="#32d74b" style="width:45px; height:45px; border:none; background:none;">
        </div>
    </div>
</div>

<div id="viewport">
    <div id="startScreen">
        <img src="logo3.png" alt="Scorpion Splash">
    </div>

    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Масштаб: 100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const startScreen = document.getElementById('startScreen');
    const bgCanvas = document.getElementById('bgCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const zoomDisplay = document.getElementById('zoomVal');

    let bgImage = new Image();
    let currentTool = 'draw';
    
    // История действий
    let history = []; 
    let redoStack = [];

    let currentShape = null;
    let currentLine = null;

    let scale = 1, posX = 0, posY = 0;
    let lastScale = 1, lastPosX = 0, lastPosY = 0;

    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));

    function setTool(tool) {
        currentTool = tool;
        document.getElementById('drawBtn').classList.toggle('active-tool', tool === 'draw');
        document.getElementById('pencilBtn').classList.toggle('active-tool', tool === 'pencil');
        document.getElementById('eraseBtn').classList.toggle('active-tool', tool === 'erase');
        document.getElementById('moveBtn').classList.toggle('active-tool', tool === 'move');
    }

    function loadMap(url) {
        if (!url) return;
        startScreen.style.display = 'none';
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = bgImage.height;
            history = [];
            redoStack = [];
            resetView();
        };
    }

    function resetView() {
        const sRatio = viewport.clientWidth / viewport.clientHeight;
        const mRatio = bgImage.width / bgImage.height;
        scale = (mRatio > sRatio) ? (viewport.clientWidth / bgImage.width) : (viewport.clientHeight / bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale) / 2;
        posY = (viewport.clientHeight - bgImage.height * scale) / 2;
        redraw();
    }

    function redraw() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        bgCanvas.style.transform = drawCanvas.style.transform = tr;
        
        bgCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
        if (bgImage.complete && bgImage.src) bgCtx.drawImage(bgImage, 0, 0);
        
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        history.forEach(item => {
            if (item.type === 'pencil') drawFreeLine(item);
            else if (item.type === 'arrow') drawArrow(item);
        });

        if (currentShape) drawArrow(currentShape);
        if (currentLine) drawFreeLine(currentLine);
        
        zoomDisplay.innerText = `Масштаб: ${Math.round(scale * 100)}%`;
    }

    function drawFreeLine(line) {
        drawCtx.beginPath();
        drawCtx.strokeStyle = line.color;
        drawCtx.lineWidth = 6 / scale;
        drawCtx.lineCap = 'round';
        drawCtx.moveTo(line.points[0].x, line.points[0].y);
        line.points.forEach(p => drawCtx.lineTo(p.x, p.y));
        drawCtx.stroke();
    }

    function drawArrow(s) {
        drawCtx.beginPath();
        drawCtx.lineWidth = 6 / scale;
        drawCtx.strokeStyle = s.color;
        drawCtx.fillStyle = s.color;
        
        const bendFactor = s.bend || 0.2;
        const cpX = (s.x1 + s.x2) / 2 - (s.y2 - s.y1) * bendFactor;
        const cpY = (s.y1 + s.y2) / 2 + (s.x2 - s.x1) * bendFactor;

        drawCtx.moveTo(s.x1, s.y1);
        drawCtx.quadraticCurveTo(cpX, cpY, s.x2, s.y2);
        drawCtx.stroke();

        const angle = Math.atan2(s.y2 - cpY, s.x2 - cpX);
        const headLen = 20 / scale;
        drawCtx.beginPath();
        drawCtx.moveTo(s.x2, s.y2);
        drawCtx.lineTo(s.x2 - headLen * Math.cos(angle - Math.PI/6), s.y2 - headLen * Math.sin(angle - Math.PI/6));
        drawCtx.lineTo(s.x2 - headLen * Math.cos(angle + Math.PI/HeadLen), s.y2 - headLen * Math.sin(angle + Math.PI/6));
        drawCtx.lineTo(s.x2 - headLen * Math.cos(angle + Math.PI/6), s.y2 - headLen * Math.sin(angle + Math.PI/6));
        drawCtx.closePath();
        drawCtx.fill();

        if (s.label) {
            drawCtx.font = `bold ${22/scale}px Arial`;
            drawCtx.shadowColor = "black";
            drawCtx.shadowBlur = 5;
            drawCtx.fillText(s.label, s.x2 + 10/scale, s.y2);
            drawCtx.shadowBlur = 0;
        }
    }

    mc.on("pinchstart panstart", (e) => {
        lastScale = scale; lastPosX = posX; lastPosY = posY;
    });

    mc.on("pinchmove panmove", (e) => {
        if (currentTool === 'move' || e.pointers.length >= 2) {
            if (e.type === 'pinchmove') scale = Math.max(0.1, Math.min(lastScale * e.scale, 8));
            posX = lastPosX + e.deltaX;
            posY = lastPosY + e.deltaY;
            redraw();
        }
    });

    let startX, startY;

    viewport.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'touch' && !e.isPrimary) return;
        const p = getCoords(e);
        startX = e.clientX; startY = e.clientY;
        
        if (currentTool === 'draw') {
            currentShape = { type: 'arrow', x1: p.x, y1: p.y, x2: p.x, y2: p.y, color: document.getElementById('colorPicker').value, label: '', bend: 0.2 };
        } else if (currentTool === 'pencil') {
            currentLine = { type: 'pencil', points: [p], color: document.getElementById('colorPicker').value };
        }
    });

    viewport.addEventListener('pointermove', (e) => {
        const p = getCoords(e);
        if (currentShape) {
            currentShape.x2 = p.x;
            currentShape.y2 = p.y;
            const dx = e.clientX - startX;
            currentShape.bend = (dx * 0.001); 
            redraw();
        } else if (currentLine) {
            currentLine.points.push(p);
            redraw();
        }
    });

    window.addEventListener('pointerup', () => {
        if (currentShape) {
            const callsign = prompt("Позывной (пусто = без надписи):");
            if (callsign !== null) {
                currentShape.label = callsign.trim().toUpperCase();
                history.push(currentShape);
                redoStack = []; // Очищаем redo при новом действии
            }
            currentShape = null;
        } else if (currentLine) {
            history.push(currentLine);
            redoStack = []; // Очищаем redo при новом действии
            currentLine = null;
        }
        redraw();
    });

    function getCoords(e) {
        const rect = viewport.getBoundingClientRect();
        return { x: (e.clientX - rect.left - posX) / scale, y: (e.clientY - rect.top - posY) / scale };
    }

    function undo() { 
        if (history.length > 0) {
            redoStack.push(history.pop());
            redraw();
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            history.push(redoStack.pop());
            redraw();
        }
    }
    
    function clearAll() { 
        if(confirm("Очистить всё?")) { 
            history = []; 
            redoStack = []; 
            redraw(); 
        } 
    }

    function saveImage() {
        const temp = document.createElement('canvas');
        temp.width = drawCanvas.width; temp.height = drawCanvas.height;
        const tCtx = temp.getContext('2d');
        tCtx.drawImage(bgCanvas, 0, 0);
        tCtx.drawImage(drawCanvas, 0, 0);
        const link = document.createElement('a');
        link.download = 'tactical-map.png';
        link.href = temp.toDataURL();
        link.click();
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW зарегистрирован'))
                .catch(err => console.log('Ошибка SW:', err));
        });
    }
</script>
</body>
</html>
