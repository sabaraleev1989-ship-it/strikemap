<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical Board</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1c2c;
            --accent: #ff9f0a;
            --danger: #ff453a;
            --success: #32d74b;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        .toolbar {
            background: var(--panel-bg);
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
            z-index: 100;
        }

        select, button {
            background: #2c2e43;
            border: 1px solid #444;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            transition: 0.2s;
        }

        button:active { background: #3d3f5a; transform: scale(0.95); }
        
        .active-tool {
            border-color: var(--accent);
            background: rgba(255, 159, 10, 0.3);
            box-shadow: 0 0 10px var(--accent);
        }

        #viewport {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
        }

        #bgCanvas { z-index: 1; pointer-events: none; }
        #drawCanvas { z-index: 2; pointer-events: none; }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            border: 1px solid #444;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="mapPresets" onchange="loadMap(this.value)" style="font-size: 16px;">
        <option value="">🗺️ Карта</option>
        <option value="logo1.png">99 Проблем</option>
        <option value="logo2.png">Ахун</option>
    </select>

    <button id="moveBtn" onclick="setTool('move')" title="Переместить карту">✥</button>
    
    <div style="width: 1px; height: 30px; background: #444; margin: 0 5px;"></div>

    <input type="color" id="colorPicker" value="#32d74b" style="width: 45px; height: 45px; border: none; padding: 0; background: none; cursor: pointer;">
    
    <button id="drawBtn" class="active-tool" onclick="setTool('draw')">✏️</button>
    <button id="eraseBtn" onclick="setTool('erase')">🧽</button>
    <button onclick="undo()">↩️</button>
    <button onclick="clearAll()" style="color: var(--danger)">🗑️</button>
    <button onclick="saveImage()" style="color: var(--success)">💾</button>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Масштаб: 100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const bgCanvas = document.getElementById('bgCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const zoomDisplay = document.getElementById('zoomVal');

    let bgImage = new Image();
    let currentTool = 'draw'; // Режимы: 'draw', 'erase', 'move'
    let history = [];

    let scale = 1, posX = 0, posY = 0;
    let lastScale = 1, lastPosX = 0, lastPosY = 0;
    
    // Инициализация Hammer.js
    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pinch());
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));

    function setTool(tool) {
        currentTool = tool;
        document.getElementById('drawBtn').classList.toggle('active-tool', tool === 'draw');
        document.getElementById('eraseBtn').classList.toggle('active-tool', tool === 'erase');
        document.getElementById('moveBtn').classList.toggle('active-tool', tool === 'move');
        
        // Меняем курсор для наглядности
        viewport.style.cursor = tool === 'move' ? 'move' : 'crosshair';
    }

    function loadMap(url) {
        if (!url) return;
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = bgImage.height;
            history = [];
            resetView();
        };
    }

    function updateTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        bgCanvas.style.transform = tr;
        drawCanvas.style.transform = tr;
        bgCtx.drawImage(bgImage, 0, 0);
        zoomDisplay.innerText = `Масштаб: ${Math.round(scale * 100)}%`;
    }

    function resetView() {
        const sRatio = viewport.clientWidth / viewport.clientHeight;
        const mRatio = bgImage.width / bgImage.height;
        scale = (mRatio > sRatio) ? (viewport.clientWidth / bgImage.width) : (viewport.clientHeight / bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale) / 2;
        posY = (viewport.clientHeight - bgImage.height * scale) / 2;
        updateTransform();
    }

    // ЛОГИКА ЖЕСТОВ (Hammer.js)
    mc.on("pinchstart panstart", (e) => {
        if (currentTool !== 'move' && e.pointers.length < 2) return;
        lastScale = scale;
        lastPosX = posX;
        lastPosY = posY;
    });

    mc.on("pinchmove panmove", (e) => {
        // Двигаем карту если включен режим перемещения ИЛИ если используется два пальца в любом режиме
        if (currentTool === 'move' || e.pointers.length >= 2) {
            if (e.type === 'pinchmove') scale = Math.max(0.1, Math.min(lastScale * e.scale, 8));
            posX = lastPosX + e.deltaX;
            posY = lastPosY + e.deltaY;
            updateTransform();
        }
    });

    // ЛОГИКА РИСОВАНИЯ
    let isDrawing = false;

    viewport.addEventListener('pointerdown', (e) => {
        if (currentTool === 'move') return; // В режиме перемещения не рисуем
        if (e.pointerType === 'touch' && !e.isPrimary) return; // Только один палец рисует
        
        isDrawing = true;
        saveState();
        const p = getCoords(e);
        drawCtx.beginPath();
        drawCtx.moveTo(p.x, p.y);
    });

    viewport.addEventListener('pointermove', (e) => {
        if (!isDrawing || currentTool === 'move' || (e.pointerType === 'touch' && !e.isPrimary)) return;
        
        const p = getCoords(e);
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';
        
        if (currentTool === 'erase') {
            drawCtx.globalCompositeOperation = 'destination-out';
            drawCtx.lineWidth = 40 / scale;
        } else {
            drawCtx.globalCompositeOperation = 'source-over';
            drawCtx.strokeStyle = document.getElementById('colorPicker').value;
            drawCtx.lineWidth = 6 / scale;
        }
        
        drawCtx.lineTo(p.x, p.y);
        drawCtx.stroke();
    });

    window.addEventListener('pointerup', () => isDrawing = false);

    function getCoords(e) {
        const rect = viewport.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left - posX) / scale,
            y: (e.clientY - rect.top - posY) / scale
        };
    }

    function saveState() {
        if (history.length > 30) history.shift();
        history.push(drawCanvas.toDataURL());
    }

    function undo() {
        if (history.length === 0) return;
        const img = new Image();
        img.src = history.pop();
        img.onload = () => {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawCtx.globalCompositeOperation = 'source-over';
            drawCtx.drawImage(img, 0, 0);
        };
    }

    function clearAll() {
        if(confirm("Очистить все рисунки?")) {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            history = [];
        }
    }

    function saveImage() {
        const temp = document.createElement('canvas');
        temp.width = drawCanvas.width; temp.height = drawCanvas.height;
        const tCtx = temp.getContext('2d');
        tCtx.drawImage(bgCanvas, 0, 0);
        tCtx.drawImage(drawCanvas, 0, 0);
        const link = document.createElement('a');
        link.download = 'tactical-map.png';
        link.href = temp.toDataURL();
        link.click();
    }
</script>
</body>
</html>
