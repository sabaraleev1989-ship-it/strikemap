<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical Board</title>
    <style>
        body {
            margin: 0; padding: 0; background: #121212; color: #e0e0e0;
            font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }
        .toolbar {
            background: #1f1f1f; padding: 8px; display: flex; gap: 6px;
            align-items: center; border-bottom: 2px solid #333; flex-wrap: wrap; z-index: 10;
        }
        select, button {
            background: #333; border: 1px solid #444; color: white;
            padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .active-tool { border-color: #00FF00; background: #2a4a2a; }
        #viewport {
            flex-grow: 1; position: relative; overflow: hidden; touch-action: none;
            background: #1a1a1a; cursor: crosshair;
        }
        /* Слои */
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #bgCanvas { z-index: 1; }
        #drawCanvas { z-index: 2; }
        
        .zoom-info {
            position: absolute; bottom: 10px; right: 10px; z-index: 5;
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="mapPresets" onchange="loadMap(this.value)">
        <option value="">-- Полигон --</option>
        <option value="logo1.png">99 проблем</option>
        <option value="logo2.png">Ахун</option>
    </select>

    <input type="color" id="colorPicker" value="#00FF00">
    <button id="drawBtn" class="active-tool" onclick="setTool('draw')">✏️</button>
    <button id="eraseBtn" onclick="setTool('erase')">🧽</button>
    
    <div style="width: 2px; height: 25px; background: #444; margin: 0 5px;"></div>
    
    <button onclick="undo()">↩️</button>
    <button onclick="redo()">↪️</button>
    <button onclick="resetZoom()">🔍 1:1</button>
    <button class="btn-clear" onclick="clearAll()" style="background:#611">🗑️</button>
    <button onclick="saveImage()" style="background:#141">💾</button>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div class="zoom-info" id="zoomVal">100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const bgCanvas = document.getElementById('bgCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const zoomDisplay = document.getElementById('zoomVal');

    let bgImage = new Image();
    let scale = 1, offsetX = 0, offsetY = 0;
    let drawing = false, currentTool = 'draw';
    
    // История для Undo/Redo
    let history = [];
    let redoStack = [];

    function setTool(tool) {
        currentTool = tool;
        document.getElementById('drawBtn').className = tool === 'draw' ? 'active-tool' : '';
        document.getElementById('eraseBtn').className = tool === 'erase' ? 'active-tool' : '';
    }

    function loadMap(url) {
        if (!url) return;
        bgImage.src = url;
        bgImage.onload = () => {
            const w = bgImage.width;
            const h = bgImage.height;
            [bgCanvas, drawCanvas].forEach(c => { c.width = w; c.height = h; });
            history = []; redoStack = [];
            resetZoom();
            render();
        };
    }

    function render() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.drawImage(bgImage, 0, 0);
        
        const transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        bgCanvas.style.transform = transform;
        drawCanvas.style.transform = transform;
        zoomDisplay.innerText = Math.round(scale * 100) + '%';
    }

    // Логика рисования
    function getMousePos(e) {
        const rect = viewport.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left - offsetX) / scale,
            y: (clientY - rect.top - offsetY) / scale
        };
    }

    viewport.addEventListener('pointerdown', (e) => {
        if (e.button === 1 || e.shiftKey) return; // Для панорамирования мышкой
        drawing = true;
        saveState();
        const pos = getMousePos(e);
        drawCtx.beginPath();
        drawCtx.moveTo(pos.x, pos.y);
    });

    window.addEventListener('pointermove', (e) => {
        if (!drawing) return;
        const pos = getMousePos(e);
        
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';
        
        if (currentTool === 'erase') {
            drawCtx.globalCompositeOperation = 'destination-out';
            drawCtx.lineWidth = 30 / scale;
        } else {
            drawCtx.globalCompositeOperation = 'source-over';
            drawCtx.strokeStyle = document.getElementById('colorPicker').value;
            drawCtx.lineWidth = 5 / scale;
        }

        drawCtx.lineTo(pos.x, pos.y);
        drawCtx.stroke();
    });

    window.addEventListener('pointerup', () => { drawing = false; });

    // Зум и Панорамирование
    viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        render();
    }, { passive: false });

    function resetZoom() {
        scale = 0.5; offsetX = 20; offsetY = 20;
        render();
    }

    // Undo / Redo
    function saveState() {
        history.push(drawCanvas.toDataURL());
        if (history.length > 20) history.shift();
        redoStack = [];
    }

    function undo() {
        if (history.length > 0) {
            redoStack.push(drawCanvas.toDataURL());
            const prevState = history.pop();
            applyState(prevState);
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            history.push(drawCanvas.toDataURL());
            const nextState = redoStack.pop();
            applyState(nextState);
        }
    }

    function applyState(dataURL) {
        const img = new Image();
        img.src = dataURL;
        img.onload = () => {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawCtx.globalCompositeOperation = 'source-over';
            drawCtx.drawImage(img, 0, 0);
        };
    }

    function clearAll() {
        if(confirm("Очистить все рисунки?")) {
            saveState();
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
    }

    function saveImage() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = drawCanvas.width;
        tempCanvas.height = drawCanvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(bgCanvas, 0, 0);
        tempCtx.drawImage(drawCanvas, 0, 0);
        const link = document.createElement('a');
        link.download = 'tactical-plan.png';
        link.href = tempCanvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
