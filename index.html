<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion Tactical v.4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --bg-dark: #0a0c14; --panel-bg: #161b22; --accent: #ff9f0a; --danger: #ff453a; --success: #32d74b; }
        body { margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .toolbar { background: var(--panel-bg); border-bottom: 2px solid #30363d; z-index: 2000; padding: 4px; }
        .tool-row { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 4px; }
        
        button, select { 
            background: #21262d; border: 1px solid #30363d; color: white; border-radius: 8px; 
            font-size: 22px; cursor: pointer; flex: 1; display: flex; align-items: center; 
            justify-content: center; min-height: 50px; transition: 0.2s;
        }
        select { flex: 1.5; font-size: 14px; }
        .active-tool { border-color: var(--accent); background: rgba(255, 159, 10, 0.2); box-shadow: inset 0 0 10px var(--accent); }
        
        #sizeModal, #tacticsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-bg); border: 2px solid var(--accent); padding: 20px;
            border-radius: 20px; z-index: 3000; display: none; flex-direction: column; gap: 15px; width: 80%;
        }
        .modal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        #viewport { flex-grow: 1; position: relative; background: #000; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2500; display: flex; align-items: center; justify-content: center; }
        #startScreen img { width: 100%; height: 100%; object-fit: cover; }
        .status-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 10px; font-size: 11px; z-index: 100; pointer-events: none; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="startScreen" onclick="this.style.display='none'"><img src="logo3.png"></div>

<div class="toolbar">
    <div class="tool-row">
        <select id="mapPresets" onchange="handleMapChange(this.value)">
            <option value="">🗺️ ПОЛИГОН</option>
            <option value="logo1.png">99 Проблем</option>
            <option value="logo2.png">Ахун</option>
        </select>
        <button onclick="undo()">↩️</button>
        <button onclick="redo()">↪️</button>
        <button onclick="deleteSelected()" style="color: var(--danger)">🗑️</button>
    </div>
    <div class="tool-row">
        <button id="moveBtn" onclick="setTool('move')" class="active-tool">✥</button>
        <button id="pencilBtn" onclick="setTool('pencil')">✏️</button>
        <button id="drawBtn" onclick="setTool('draw')">↗️</button>
        <button id="tacticsBtn" onclick="setTool('tactics')">🚩</button>
        <div style="flex:0.4; display:flex; justify-content:center; align-items:center;">
            <input type="color" id="colorPicker" value="#32d74b" style="width:40px; height:40px; border:none; background:none;">
        </div>
    </div>
</div>

<div id="sizeModal">
    <div style="text-align:center; font-weight:bold; color:var(--accent)">ТОЛЩИНА ЛИНИИ</div>
    <input type="range" id="sizeInput" min="4" max="80" value="20" style="width:100%; height:40px; accent-color:var(--accent);">
    <button onclick="document.getElementById('sizeModal').style.display='none'" style="background:var(--accent)">ГОТОВО</button>
</div>

<div id="tacticsModal">
    <div class="modal-grid" id="shapesGrid">
        <button onclick="selectTacticShape('flag')">🚩</button>
        <button onclick="selectTacticShape('circle')">⭕</button>
        <button onclick="selectTacticShape('square')">⬛</button>
        <button onclick="selectTacticShape('skull')">💀</button>
        <button onclick="selectTacticShape('boom')">💥</button>
        <button onclick="selectTacticShape('shield')">🛡️</button>
        <button onclick="selectTacticShape('star')">⭐</button>
    </div>
</div>

<div id="viewport">
    <canvas id="bgCanvas"></canvas>
    <canvas id="drawCanvas"></canvas>
    <canvas id="tempCanvas"></canvas>
    <div class="status-bar" id="zoomVal">Зум: 100%</div>
</div>

<script>
    const viewport = document.getElementById('viewport'), bgCanvas = document.getElementById('bgCanvas'), drawCanvas = document.getElementById('drawCanvas'), tempCanvas = document.getElementById('tempCanvas');
    const bgCtx = bgCanvas.getContext('2d'), drawCtx = drawCanvas.getContext('2d'), tempCtx = tempCanvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');

    let bgImage = new Image(), objects = [], history = [], redoStack = [], selectedObj = null;
    let scale = 1, posX = 0, posY = 0, lastScale, lastPosX, lastPosY;
    let currentTool = 'move', currentTacticShape = 'flag', isDrawing = false, startP = {x:0, y:0};

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool-row button').forEach(b => b.classList.remove('active-tool'));
        document.getElementById(t+'Btn')?.classList.add('active-tool');
        if(t === 'tactics') document.getElementById('tacticsModal').style.display = 'flex';
        selectedObj = null; render();
    }

    function selectTacticShape(s) { 
        currentTacticShape = s; 
        document.getElementById('tacticsModal').style.display = 'none'; 
        document.getElementById('tacticsBtn').innerText = document.querySelector(`[onclick="selectTacticShape('${s}')"]`).innerText;
        setTool('tactics'); 
    }

    function handleMapChange(url) {
        if (!url) { document.getElementById('startScreen').style.display = 'flex'; return; }
        document.getElementById('startScreen').style.display = 'none';
        bgImage.src = url;
        bgImage.onload = () => {
            bgCanvas.width = drawCanvas.width = tempCanvas.width = bgImage.width;
            bgCanvas.height = drawCanvas.height = tempCanvas.height = bgImage.height;
            objects = []; history = []; redoStack = []; resetView(); render();
        };
    }

    function resetView() {
        scale = Math.min(viewport.clientWidth/bgImage.width, viewport.clientHeight/bgImage.height);
        posX = (viewport.clientWidth - bgImage.width * scale)/2;
        posY = (viewport.clientHeight - bgImage.height * scale)/2;
        applyTransform();
    }

    function applyTransform() {
        const tr = `translate(${posX}px, ${posY}px) scale(${scale})`;
        [bgCanvas, drawCanvas, tempCanvas].forEach(c => c.style.transform = tr);
        bgCtx.drawImage(bgImage, 0, 0);
        document.getElementById('zoomVal').innerText = `Зум: ${Math.round(scale * 100)}%`;
    }

    function render() {
        drawCtx.clearRect(0,0, drawCanvas.width, drawCanvas.height);
        objects.forEach(obj => {
            drawCtx.save();
            if(obj === selectedObj) {
                drawCtx.shadowBlur = 15; drawCtx.shadowColor = "white";
                drawCtx.strokeStyle = "var(--accent)"; drawCtx.lineWidth = 4/scale;
                const margin = (obj.size || 20) * 0.8;
                drawCtx.strokeRect(obj.x - margin, obj.y - margin, margin*2, margin*2);
            }
            if(obj.type === 'tactic') drawShape(drawCtx, obj);
            else if(obj.type === 'arrow') drawArrow(drawCtx, obj);
            else if(obj.type === 'pencil') drawPencil(drawCtx, obj);
            drawCtx.restore();
        });
    }

    function drawShape(ctx, obj) {
        ctx.save(); ctx.translate(obj.x, obj.y);
        ctx.fillStyle = obj.color; ctx.strokeStyle = obj.color; ctx.lineWidth = obj.size/8;
        const s = obj.size/2;
        const emojiMap = {flag:'🚩', circle:'⭕', square:'⬛', skull:'💀', boom:'💥', shield:'🛡️', star:'⭐'};
        if(obj.shape === 'flag') { ctx.fillRect(-2, -s, 4, s*2); ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, -s/2); ctx.lineTo(0,0); ctx.fill(); }
        else if(obj.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0, s, 0, 7); ctx.stroke(); }
        else if(obj.shape === 'square') { ctx.strokeRect(-s, -s, obj.size, obj.size); }
        else { ctx.font = `${obj.size}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emojiMap[obj.shape] || '📍', 0,0); }
        ctx.restore();
    }

    function drawArrow(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.fillStyle = obj.color; ctx.lineWidth = obj.size/4;
        ctx.beginPath(); ctx.moveTo(obj.x, obj.y); ctx.lineTo(obj.x2, obj.y2); ctx.stroke();
        const angle = Math.atan2(obj.y2 - obj.y, obj.x2 - obj.x);
        const head = obj.size * 1.2;
        ctx.beginPath(); ctx.moveTo(obj.x2, obj.y2);
        ctx.lineTo(obj.x2 - head * Math.cos(angle - 0.5), obj.y2 - head * Math.sin(angle - 0.5));
        ctx.lineTo(obj.x2 - head * Math.cos(angle + 0.5), obj.y2 - head * Math.sin(angle + 0.5));
        ctx.fill();
        if (obj.label) {
            ctx.font = `bold ${obj.size * 1.2}px Arial`; ctx.textAlign = "center";
            ctx.lineWidth = 4/scale; ctx.strokeStyle = "black";
            ctx.strokeText(obj.label.toUpperCase(), obj.x2, obj.y2 - head);
            ctx.fillText(obj.label.toUpperCase(), obj.x2, obj.y2 - head);
        }
    }

    function drawPencil(ctx, obj) {
        ctx.strokeStyle = obj.color; ctx.lineWidth = obj.width; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(obj.points[0].x, obj.points[0].y);
        obj.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
    }

    // ПОИНТЕРЫ
    viewport.addEventListener('pointerdown', (e) => {
        if(!bgImage.src) return;
        const p = getCoords({x:e.clientX, y:e.clientY});
        
        // Поиск объекта под пальцем
        const found = [...objects].reverse().find(o => Math.hypot(o.x - p.x, o.y - p.y) < 40/scale);
        if(found) { selectedObj = found; render(); return; }
        
        if(currentTool === 'move') { selectedObj = null; render(); return; }
        
        isDrawing = true; startP = p; saveState();
        if(currentTool === 'pencil') {
            objects.push({ type:'pencil', color:colorPicker.value, width: document.getElementById('sizeInput').value/scale, points:[p] });
        }
    });

    viewport.addEventListener('pointermove', (e) => {
        if(!isDrawing) return;
        const p = getCoords({x:e.clientX, y:e.clientY});
        tempCtx.clearRect(0,0, tempCanvas.width, tempCanvas.height);
        
        if(currentTool === 'pencil') {
            objects[objects.length-1].points.push(p);
            render();
        } else if(currentTool === 'draw') {
            drawArrow(tempCtx, {x:startP.x, y:startP.y, x2:p.x, y2:p.y, color:colorPicker.value, size:document.getElementById('sizeInput').value/scale});
        }
    });

    window.addEventListener('pointerup', (e) => {
        if(!isDrawing) return;
        isDrawing = false;
        const p = getCoords({x:e.clientX, y:e.clientY});
        tempCtx.clearRect(0,0, tempCanvas.width, tempCanvas.height);

        if(currentTool === 'draw') {
            const label = prompt("Позывной:");
            objects.push({ type:'arrow', x:startP.x, y:startP.y, x2:p.x, y2:p.y, size:document.getElementById('sizeInput').value/scale, color:colorPicker.value, label:label });
        } else if(currentTool === 'tactics') {
            objects.push({ type:'tactic', shape:currentTacticShape, x:p.x, y:p.y, size:document.getElementById('sizeInput').value/scale*2, color:colorPicker.value });
        }
        render();
    });

    // GESTURES
    const mc = new Hammer.Manager(viewport);
    mc.add(new Hammer.Pan({ threshold: 0, pointers: 0 }));
    mc.add(new Hammer.Pinch());

    mc.on("panstart pinchstart", () => {
        lastPosX = posX; lastPosY = posY; lastScale = scale;
        if(selectedObj) {
            selectedObj._x = selectedObj.x; selectedObj._y = selectedObj.y;
            selectedObj._x2 = selectedObj.x2; selectedObj._y2 = selectedObj.y2;
            selectedObj._s = selectedObj.size;
        }
    });

    mc.on("panmove pinchemove", (e) => {
        if(selectedObj) {
            const dx = e.deltaX/scale, dy = e.deltaY/scale;
            if(e.type === 'pinchmove') {
                selectedObj.size = Math.max(10, selectedObj._s * e.scale);
            } else {
                selectedObj.x = selectedObj._x + dx;
                selectedObj.y = selectedObj._y + dy;
                if(selectedObj.type === 'arrow') { selectedObj.x2 = selectedObj._x2 + dx; selectedObj.y2 = selectedObj._y2 + dy; }
            }
            render();
        } else if(currentTool === 'move') {
            posX = lastPosX + e.deltaX; posY = lastPosY + e.deltaY;
            if(e.type === 'pinchmove') scale = Math.max(0.05, lastScale * e.scale);
            applyTransform();
        }
    });

    function getCoords(c) {
        const r = viewport.getBoundingClientRect();
        return { x: (c.x - r.left - posX)/scale, y: (c.y - r.top - posY)/scale };
    }

    function saveState() { history.push(JSON.stringify(objects)); redoStack = []; }
    function undo() { if(history.length) { redoStack.push(JSON.stringify(objects)); objects = JSON.parse(history.pop()); render(); } }
    function redo() { if(redoStack.length) { history.push(JSON.stringify(objects)); objects = JSON.parse(redoStack.pop()); render(); } }
    function clearAll() { if(confirm("Очистить?")) { objects=[]; history=[]; redoStack=[]; render(); } }
    function deleteSelected() { if(selectedObj) { saveState(); objects = objects.filter(o => o !== selectedObj); selectedObj = null; render(); } }

    [document.getElementById('pencilBtn'), document.getElementById('drawBtn')].forEach(btn => {
        new Hammer(btn).on('press', () => document.getElementById('sizeModal').style.display = 'flex');
    });
</script>
</body>
</html>
